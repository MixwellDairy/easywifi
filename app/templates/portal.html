<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.portal_title }}</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: {{ config.portal_bg_color }}; color: #333; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .logo { max-width: 150px; margin-bottom: 20px; }
        input[type="text"], input[type="email"], button { width: 100%; margin: 12px 0; padding: 12px; box-sizing: border-box; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; }
        button { background: {{ config.portal_color }}; color: white; border: none; cursor: pointer; font-weight: bold; }
        .tos { font-size: 0.8em; color: #666; max-height: 100px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 15px; text-align: left; background: #fafafa; }
        .welcome { margin-bottom: 20px; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        {% if config.logo_filename %}
        <img src="{{ url_for('static', filename='uploads/' + config.logo_filename) }}" class="logo" alt="Logo">
        {% endif %}
        <h2>{{ config.portal_title }}</h2>
        <p class="welcome">{{ config.portal_welcome }}</p>

        {% if user %}
        <div style="margin: 20px 0; padding: 15px; background: #e7f3ff; border-radius: 8px; border: 1px solid #b3d7ff;">
            <p>Welcome back, <strong>{{ user.name }}</strong>!</p>
            <form action="/login" method="post">
                <input type="hidden" name="mac" value="{{ mac }}">
                <input type="hidden" name="name" value="{{ user.name }}">
                <input type="hidden" name="email" value="{{ user.email }}">
                <button type="submit">Reconnect Now</button>
            </form>
            <p style="font-size: 0.8em; margin-top: 10px;"><a href="#" onclick="document.getElementById('reg-form').style.display='block'; this.parentElement.parentElement.style.display='none'; return false;" style="color: #666;">Not you? Click here to register.</a></p>
        </div>
        {% endif %}

        <form action="/login" method="post" id="reg-form" style="{{ 'display:none;' if user else '' }}">
            <input type="hidden" name="mac" value="{{ mac }}">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>

            {% if config.tos_enabled %}
            <div class="tos">
                {{ config.tos_text }}
            </div>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9em; margin-bottom: 10px;">
                <input type="checkbox" name="tos_agree" required> I agree to the Terms of Service
            </label>
            {% endif %}

            <button type="submit">{{ config.portal_button_text }}</button>
        </form>
    </div>
</body>
</html>
