<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free WiFi - Captive Portal</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f4; }
        .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input, button { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        .tos { font-size: 0.8em; color: #666; max-height: 100px; overflow-y: auto; border: 1px solid #ddd; padding: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Join WiFi</h2>
        <form action="/login" method="post">
            <input type="hidden" name="mac" value="{{ mac }}">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>

            {% if config.tos_enabled %}
            <div class="tos">
                {{ config.tos_text }}
            </div>
            <label>
                <input type="checkbox" name="tos_agree" required> I agree to the Terms of Service
            </label>
            {% endif %}

            <button type="submit">Connect</button>
        </form>
    </div>
</body>
</html>
